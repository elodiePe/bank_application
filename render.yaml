services:
  - type: web
    name: banque-familiale-api
    runtime: node
    plan: free
    rootDir: .
    # NODE_ENV=production (set below, needed at runtime) makes a plain `npm install` skip
    # devDependencies — but tsc, @types/node, prisma etc. are all devDependencies and are
    # required to build. --include=dev overrides that for this one install.
    buildCommand: npm install --include=dev && npm run build -w packages/shared && npm run build -w apps/api
    startCommand: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: COOKIE_SECURE
        value: true
      - key: WEB_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_SECONDS
        value: 900
      - key: JWT_REFRESH_TTL_SECONDS
        value: 2592000
      - key: FAMILY_OWNER_SECRET
        generateValue: true
      - key: FAMILY_OWNER_TTL_SECONDS
        value: 2592000
      - key: EMAIL_ACTION_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
