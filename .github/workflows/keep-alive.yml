name: Keep API awake

# Render's free tier spins the API down after ~15 min of no traffic, so the next real
# request pays a 30-60s cold-start penalty. Pinging /health on a shorter interval than
# the idle timeout keeps it warm without needing any third-party uptime service/account.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: curl -sS -o /dev/null -w "HTTP %{http_code}\n" --fail https://api.unmatched.ch/health
